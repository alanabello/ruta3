<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta3 — Panel del conductor</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14161a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruta3">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14161a;
    --bg-card: #1c1f26;
    --bg-card-2: #22252d;
    --line: #2c303a;
    --text: #f2f1ea;
    --text-dim: #9a9da6;
    --text-faint: #62656e;
    --amber: #ffb020;
    --amber-dim: #4a3714;
    --green-pos: #7fd858;
    --uber: #e8e8e8;
    --didi: #ff7a33;
    --indrive: #a4d84a;
    --red: #ff6459;
    font-size: 16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 84px;
  }
  .mono{ font-family: 'JetBrains Mono', monospace; }
  .wrap{ max-width: 480px; margin: 0 auto; padding: 20px 16px 8px; }

  /* header */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 2px 18px;
  }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand-mark{
    width:30px; height:30px; border-radius: 8px;
    background: var(--amber); color:#1a1400;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:15px; font-family:'JetBrains Mono',monospace;
  }
  .brand-name{ font-weight:700; font-size:16px; letter-spacing:0.2px; }
  .brand-sub{ font-size:11px; color:var(--text-faint); margin-top:1px; }
  .today-pill{
    font-size:11px; color:var(--text-dim); background:var(--bg-card);
    border:1px solid var(--line); padding:5px 10px; border-radius:20px;
  }
  .top-actions{ display:flex; align-items:center; gap:8px; }
  .apk-link{
    font-size:11px; color:#1a1400; background:var(--amber);
    border:1px solid var(--amber); padding:5px 10px; border-radius:20px;
    text-decoration:none; font-weight:700; white-space:nowrap;
  }

  /* net total hero */
  .hero{
    background: var(--bg-card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px 18px;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
  }
  .hero-label{ font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .hero-value{ font-size:38px; font-weight:700; font-family:'JetBrains Mono',monospace; letter-spacing:-1px; }
  .hero-value.neg{ color: var(--red); }
  .hero-row{ display:flex; justify-content:space-between; align-items:flex-end; }
  .hero-mini{ text-align:right; font-size:12px; color:var(--text-dim); }
  .hero-mini b{ color:var(--text); font-family:'JetBrains Mono',monospace; font-weight:500; }
  .period-toggle{ display:flex; gap:6px; margin-top:14px; }
  .period-btn{
    flex:1; text-align:center; padding:7px 0; border-radius:8px;
    font-size:12px; color:var(--text-dim); background:var(--bg-card-2);
    border:1px solid var(--line); cursor:pointer;
  }
  .period-btn.active{ background:var(--amber-dim); color:var(--amber); border-color:var(--amber); }

  /* platform bars */
  .platform-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:16px;
    padding:16px 18px; margin-bottom:14px;
  }
  .section-title{ font-size:13px; color:var(--text-dim); margin: 0 0 12px; font-weight:500; }
  .p-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .p-row:last-child{ margin-bottom:0; }
  .p-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .p-name{ font-size:13px; width:64px; flex-shrink:0; color:var(--text-dim); }
  .p-bar-track{ flex:1; height:8px; background:var(--bg-card-2); border-radius:4px; overflow:hidden; }
  .p-bar-fill{ height:100%; border-radius:4px; }
  .p-amount{ font-size:13px; font-family:'JetBrains Mono',monospace; width:64px; text-align:right; flex-shrink:0; }

  /* empty state */
  .empty{
    text-align:center; padding: 34px 18px; color:var(--text-faint); font-size:13px;
  }

  /* tabs content */
  .tab-content{ display:none; }
  .tab-content.active{ display:block; }

  /* form */
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .field input, .field select{
    width:100%; background:var(--bg-card-2); border:1px solid var(--line);
    color:var(--text); padding:12px 12px; border-radius:10px; font-size:15px;
    font-family:'Space Grotesk',sans-serif;
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--amber); }
  .field input.mono-input{ font-family:'JetBrains Mono',monospace; }
  .platform-select{ display:flex; gap:8px; }
  .platform-opt{
    flex:1; text-align:center; padding:12px 4px; border-radius:10px;
    border:1.5px solid var(--line); background:var(--bg-card-2);
    font-size:13px; cursor:pointer; color:var(--text-dim);
  }
  .platform-opt.selected{ border-color: var(--sel-color, var(--amber)); color:var(--text); background: var(--bg-card); }
  .btn-primary{
    width:100%; background:var(--amber); color:#1a1400; border:none;
    padding:14px; border-radius:12px; font-size:15px; font-weight:700;
    cursor:pointer; font-family:'Space Grotesk',sans-serif;
  }
  .btn-primary:active{ transform: scale(0.98); }
  .btn-secondary{
    width:100%; background:transparent; color:var(--text-dim); border:1px solid var(--line);
    padding:12px; border-radius:12px; font-size:13px; cursor:pointer; margin-top:8px;
  }

  /* list items */
  .list-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:14px; }
  .list-item{ display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--line); }
  .list-item:last-child{ border-bottom:none; }
  .li-badge{ width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .li-body{ flex:1; min-width:0; }
  .li-title{ font-size:14px; }
  .li-sub{ font-size:11.5px; color:var(--text-faint); margin-top:2px; }
  .li-amount{ font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; flex-shrink:0; }
  .li-del{ color:var(--text-faint); background:none; border:none; font-size:18px; cursor:pointer; padding:4px 2px; flex-shrink:0; line-height:1; }

  .threshold-row{ display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:12px 16px; }
  .threshold-row label{ font-size:12px; color:var(--text-dim); flex:1; }
  .threshold-row input{ width:70px; background:var(--bg-card-2); border:1px solid var(--line); color:var(--text); padding:8px; border-radius:8px; font-family:'JetBrains Mono',monospace; text-align:center; }
  .threshold-row + .threshold-row{ margin-top:10px; }

  /* bottom nav */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0;
    background: rgba(20,22,26,0.96); backdrop-filter: blur(8px);
    border-top:1px solid var(--line);
    display:flex; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    max-width:480px; margin:0 auto;
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 0 6px; background:none; border:none; color:var(--text-faint); font-size:10.5px;
    cursor:pointer; font-family:'Space Grotesk',sans-serif;
  }
  .tab-btn.active{ color:var(--amber); }
  .tab-icon{ width:20px; height:20px; }

  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--bg-card-2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity 0.25s;
    pointer-events:none; z-index:50; max-width: 90%; text-align:center;
  }
  .toast.show{ opacity:1; }

  h2.page-title{ font-size:16px; font-weight:700; margin: 4px 0 16px; }
  .row-2{ display:flex; gap:10px; }
  .row-2 > *{ flex:1; }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">R3</div>
      <div>
        <div class="brand-name">Ruta3</div>
        <div class="brand-sub">Uber · Didi · InDrive</div>
      </div>
    </div>
    <div class="top-actions">
      <a class="apk-link" href="downloads/ruta3.apk" download>Descargar APK</a>
      <div class="today-pill" id="date-pill">—</div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="tab-content active" id="tab-resumen">
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="hero-label">Neto (viajes − gastos)</div>
          <div class="hero-value mono" id="hero-net">$0</div>
        </div>
        <div class="hero-mini">
          <div>Viajes <b id="hero-trips">0</b></div>
          <div style="margin-top:4px;">Gastos <b id="hero-expenses">$0</b></div>
        </div>
      </div>
      <div class="period-toggle">
        <div class="period-btn active" data-period="today">Hoy</div>
        <div class="period-btn" data-period="week">7 días</div>
        <div class="period-btn" data-period="month">30 días</div>
        <div class="period-btn" data-period="all">Todo</div>
      </div>
    </div>

    <div class="platform-card">
      <p class="section-title">Ganancias por app</p>
      <div id="platform-bars"></div>
    </div>

    <div class="list-card" id="recent-card">
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- REGISTRAR -->
  <div class="tab-content" id="tab-registrar">
    <h2 class="page-title">Registrar viaje</h2>
    <div class="field">
      <label>Plataforma</label>
      <div class="platform-select" id="platform-select">
        <div class="platform-opt" data-platform="uber" style="--sel-color:#e8e8e8">Uber</div>
        <div class="platform-opt" data-platform="didi" style="--sel-color:#ff7a33">Didi</div>
        <div class="platform-opt" data-platform="indrive" style="--sel-color:#a4d84a">InDrive</div>
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Monto cobrado ($)</label>
        <input type="number" inputmode="decimal" class="mono-input" id="trip-amount" placeholder="4500">
      </div>
      <div class="field">
        <label>Kilómetros (opcional)</label>
        <input type="number" inputmode="decimal" class="mono-input" id="trip-km" placeholder="8.5">
      </div>
    </div>
    <button class="btn-primary" id="save-trip">Guardar viaje</button>

    <div style="height:22px;"></div>
    <h2 class="page-title">Registrar gasto</h2>
    <div class="field">
      <label>Categoría</label>
      <select id="expense-category">
        <option value="Combustible">Combustible</option>
        <option value="Mantenimiento">Mantenimiento</option>
        <option value="Lavado">Lavado</option>
        <option value="Peaje">Peaje</option>
        <option value="Comisión app">Comisión app</option>
        <option value="Otro">Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Monto ($)</label>
      <input type="number" inputmode="decimal" class="mono-input" id="expense-amount" placeholder="12000">
    </div>
    <button class="btn-primary" id="save-expense" style="background:var(--bg-card-2); color:var(--text); border:1px solid var(--line);">Guardar gasto</button>
  </div>

  <!-- HISTORIAL (gastos) -->
  <div class="tab-content" id="tab-gastos">
    <h2 class="page-title">Gastos registrados</h2>
    <div class="list-card" id="expenses-card">
      <div id="expenses-list"></div>
    </div>
  </div>

  <!-- AJUSTES -->
  <div class="tab-content" id="tab-ajustes">
    <h2 class="page-title">Tus precios mínimos</h2>
    <div class="threshold-row">
      <label>Mínimo por km ($/km)</label>
      <input type="number" inputmode="numeric" id="setting-min-km" value="400">
    </div>
    <div class="threshold-row">
      <label>Mínimo por hora ($/h)</label>
      <input type="number" inputmode="numeric" id="setting-min-hour" value="6000">
    </div>
    <button class="btn-primary" id="save-settings" style="margin-top:12px;">Guardar precios</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="tabbar">
  <button class="tab-btn active" data-tab="resumen">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 13h4v8H3zM10 8h4v13h-4zM17 3h4v18h-4z"/></svg>
    Resumen
  </button>
  <button class="tab-btn" data-tab="registrar">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    Registrar
  </button>
  <button class="tab-btn" data-tab="gastos">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18M3 12h18M3 17h12"/></svg>
    Gastos
  </button>
  <button class="tab-btn" data-tab="ajustes">
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    Ajustes
  </button>
</div>

<script>
(function(){
  const PLATFORM_META = {
    uber:    { label:'Uber',    color:'#e8e8e8', dark:'#3a3a3a' },
    didi:    { label:'Didi',    color:'#ff7a33', dark:'#5c2c10' },
    indrive: { label:'InDrive', color:'#a4d84a', dark:'#37481a' },
  };
  let trips = [];
  let expenses = [];
  let settings = { minPerKm: 400, minPerHour: 6000 };
  let selectedPlatform = null;
  let activePeriod = 'today';

  const $ = (id) => document.getElementById(id);
  const fmt = (n) => '$' + Math.round(n).toLocaleString('es-CL');
  const ruta3NativeSettings = () => window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Ruta3Settings;

  async function loadRules(){
    try{
      const response = await fetch('http://127.0.0.1:8001/api/rules');
      if(!response.ok) return null;
      return await response.json();
    } catch (e) {
      return null;
    }
  }

  async function validateOffer(payload){
    try{
      const response = await fetch('http://127.0.0.1:8001/api/validate-offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if(!response.ok){
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || 'No se pudo validar la oferta');
      }
      return await response.json();
    } catch (error) {
      showToast(error.message || 'No se pudo validar la oferta');
      return null;
    }
  }

  function showToast(msg){
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1800);
  }

  async function loadAll(){
    try{ trips = JSON.parse(localStorage.getItem('ruta3_trips') || '[]'); }
    catch(e){ trips = []; }
    try{ expenses = JSON.parse(localStorage.getItem('ruta3_expenses') || '[]'); }
    catch(e){ expenses = []; }
    try{ settings = JSON.parse(localStorage.getItem('ruta3_settings') || '{"minPerKm":400,"minPerHour":6000}'); }
    catch(e){ settings = { minPerKm: 400, minPerHour: 6000 }; }
    if(settings.minPerHour === undefined) settings.minPerHour = 6000;
    const nativeSettings = ruta3NativeSettings();
    if(nativeSettings && nativeSettings.getSettings){
      try{
        const native = await nativeSettings.getSettings();
        settings.minPerKm = Number(native.minPerKm || settings.minPerKm);
        settings.minPerHour = Number(native.minPerHour || settings.minPerHour);
      } catch(e){}
    }
    const rules = await loadRules();
    if(rules){
      settings.minPerKm = Number(rules.minPerKm || settings.minPerKm);
      settings.minPerHour = Number(rules.minPerHour || settings.minPerHour);
    }
    render();
  }

  async function saveTrips(){
    try{ localStorage.setItem('ruta3_trips', JSON.stringify(trips)); }
    catch(e){ showToast('No se pudo guardar. Espacio lleno o navegador privado.'); }
  }
  async function saveExpenses(){
    try{ localStorage.setItem('ruta3_expenses', JSON.stringify(expenses)); }
    catch(e){ showToast('No se pudo guardar. Espacio lleno o navegador privado.'); }
  }
  async function saveSettings(){
    try{ localStorage.setItem('ruta3_settings', JSON.stringify(settings)); }
    catch(e){}
    const nativeSettings = ruta3NativeSettings();
    if(nativeSettings && nativeSettings.saveSettings){
      try{
        await nativeSettings.saveSettings({
          minPerKm: Number(settings.minPerKm),
          minPerHour: Number(settings.minPerHour)
        });
      } catch(e){}
    }
  }

  function withinPeriod(ts, period){
    const now = Date.now();
    const day = 86400000;
    if(period === 'today'){
      const d = new Date(); d.setHours(0,0,0,0);
      return ts >= d.getTime();
    }
    if(period === 'week') return ts >= now - 7*day;
    if(period === 'month') return ts >= now - 30*day;
    return true;
  }

  function render(){
    $('date-pill').textContent = new Date().toLocaleDateString('es-CL', { weekday:'short', day:'numeric', month:'short' });
    $('setting-min-km').value = settings.minPerKm;
    $('setting-min-hour').value = settings.minPerHour;

    const pTrips = trips.filter(t => withinPeriod(t.ts, activePeriod));
    const pExpenses = expenses.filter(e => withinPeriod(e.ts, activePeriod));

    const totalTrips = pTrips.reduce((s,t)=> s + t.amount, 0);
    const totalExpenses = pExpenses.reduce((s,e)=> s + e.amount, 0);
    const net = totalTrips - totalExpenses;

    $('hero-net').textContent = fmt(net);
    $('hero-net').classList.toggle('neg', net < 0);
    $('hero-trips').textContent = pTrips.length;
    $('hero-expenses').textContent = fmt(totalExpenses);

    const byPlatform = { uber:0, didi:0, indrive:0 };
    pTrips.forEach(t => { byPlatform[t.platform] = (byPlatform[t.platform]||0) + t.amount; });
    const maxVal = Math.max(1, ...Object.values(byPlatform));

    const barsHtml = Object.keys(PLATFORM_META).map(key => {
      const meta = PLATFORM_META[key];
      const val = byPlatform[key] || 0;
      const pct = (val / maxVal) * 100;
      return `<div class="p-row">
        <span class="p-dot" style="background:${meta.color}"></span>
        <span class="p-name">${meta.label}</span>
        <div class="p-bar-track"><div class="p-bar-fill" style="width:${pct}%; background:${meta.color}"></div></div>
        <span class="p-amount mono">${fmt(val)}</span>
      </div>`;
    }).join('');
    $('platform-bars').innerHTML = barsHtml;

    const recent = [...trips].sort((a,b)=> b.ts - a.ts).slice(0, 8);
    if(recent.length === 0){
      $('recent-list').innerHTML = `<div class="empty">Todavía no registraste viajes.<br>Andá a la pestaña Registrar para empezar.</div>`;
    } else {
      $('recent-list').innerHTML = recent.map(t => {
        const meta = PLATFORM_META[t.platform];
        const d = new Date(t.ts);
        const kmTxt = t.km ? `${t.km} km` : 'sin km';
        return `<div class="list-item">
          <div class="li-badge" style="background:${meta.dark}; color:${meta.color};">${meta.label.slice(0,2).toUpperCase()}</div>
          <div class="li-body">
            <div class="li-title">${meta.label}</div>
            <div class="li-sub">${d.toLocaleDateString('es-CL',{day:'numeric',month:'short'})} · ${kmTxt}</div>
          </div>
          <div class="li-amount">${fmt(t.amount)}</div>
          <button class="li-del" data-del-trip="${t.id}" aria-label="Eliminar">×</button>
        </div>`;
      }).join('');
    }

    if(expenses.length === 0){
      $('expenses-list').innerHTML = `<div class="empty">Sin gastos registrados todavía.</div>`;
    } else {
      const sorted = [...expenses].sort((a,b)=> b.ts - a.ts);
      $('expenses-list').innerHTML = sorted.map(e => {
        const d = new Date(e.ts);
        return `<div class="list-item">
          <div class="li-badge" style="background:#2c303a; color:#ffb020;">$</div>
          <div class="li-body">
            <div class="li-title">${e.category}</div>
            <div class="li-sub">${d.toLocaleDateString('es-CL',{day:'numeric',month:'short'})}</div>
          </div>
          <div class="li-amount">${fmt(e.amount)}</div>
          <button class="li-del" data-del-expense="${e.id}" aria-label="Eliminar">×</button>
        </div>`;
      }).join('');
    }
  }

  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePeriod = btn.dataset.period;
      render();
    });
  });

  document.querySelectorAll('.platform-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.platform-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedPlatform = opt.dataset.platform;
    });
  });

  $('save-trip').addEventListener('click', async () => {
    const amount = parseFloat($('trip-amount').value);
    const km = parseFloat($('trip-km').value);
    if(!selectedPlatform){ showToast('Elegí una plataforma'); return; }
    if(!amount || amount <= 0){ showToast('Ingresá un monto válido'); return; }
    trips.push({ id: 't'+Date.now(), platform: selectedPlatform, amount, km: isNaN(km) ? null : km, ts: Date.now() });
    await saveTrips();
    $('trip-amount').value = ''; $('trip-km').value = '';
    document.querySelectorAll('.platform-opt').forEach(o => o.classList.remove('selected'));
    selectedPlatform = null;
    if(!isNaN(km) && km > 0){
      showToast(`Viaje guardado — ${Math.round(amount/km).toLocaleString('es-CL')} $/km`);
    } else {
      showToast('Viaje guardado');
    }
    render();
  });

  $('save-expense').addEventListener('click', async () => {
    const amount = parseFloat($('expense-amount').value);
    const category = $('expense-category').value;
    if(!amount || amount <= 0){ showToast('Ingresá un monto válido'); return; }
    expenses.push({ id: 'e'+Date.now(), category, amount, ts: Date.now() });
    await saveExpenses();
    $('expense-amount').value = '';
    showToast('Gasto guardado');
    render();
  });

  document.addEventListener('click', async (ev) => {
    const delTrip = ev.target.getAttribute && ev.target.getAttribute('data-del-trip');
    const delExpense = ev.target.getAttribute && ev.target.getAttribute('data-del-expense');
    if(delTrip){
      trips = trips.filter(t => t.id !== delTrip);
      await saveTrips();
      render();
    }
    if(delExpense){
      expenses = expenses.filter(e => e.id !== delExpense);
      await saveExpenses();
      render();
    }
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      $('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  $('save-settings').addEventListener('click', async () => {
    const minPerKm = parseInt($('setting-min-km').value, 10);
    const minPerHour = parseInt($('setting-min-hour').value, 10);
    if(!minPerKm || minPerKm <= 0 || !minPerHour || minPerHour <= 0){
      showToast('Ingresá precios válidos');
      return;
    }
    settings.minPerKm = minPerKm;
    settings.minPerHour = minPerHour;
    await saveSettings();
    showToast('Precios guardados');
  });

  loadAll();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
